              - 'heading "30th Anniversary of the Museum''s Opening, 100th Anniversary of Claude Monet''s Death: Claude Monet Exhibition" [level=2]'
          - generic:
            - paragraph: ● All 8 Monet works owned by the Asahi Group will be exhibited together for the first time in 10 years. ● The "Jewel Box in the Earth" (Underground Pavilion), an exhibition room designed by Tadao Ando specifically for the "Water Lilies." ● Witness Monet's magnum opus from his later years. As the museum celebrates its 30th anniversary, a passageway leading underground from the main building, the "Oyamazaki Villa," which is over 100 years old, leads to a circular exhibition room designed by Tadao Ando, created specifically to display Claude Monet's "Water Lilies." In this "Jewel Box in the Earth" (Underground Pavilion), all of Monet's works, a cornerstone of the museum's collection, will be exhibited throughout the 30th anniversary year. This marks the first time in 10 years that all 8 works in the collection—5 "Water Lilies," 3 "Japanese-style Drum Bridge," and others—will be displayed together. Enjoy an immersive viewing experience surrounded by Monet's magnum opus in a tranquil space that harmonizes beautifully with the garden and surrounding nature. List of Works
