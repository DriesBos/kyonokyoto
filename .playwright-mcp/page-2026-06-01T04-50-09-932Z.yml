              - 'heading "[Autumn] Bronze Gallery: Special Exhibition \"Bronze Inscriptions\" - The Age of Chinese Bronze" [level=2]'
          - generic:
            - paragraph: "The more you look at them, the more interesting and fascinating they become—the Sumitomo Collection of Chinese bronze artifacts, hailed as among the world's finest, awaits you at the Bronze Gallery. The Bronze Gallery, comprised of four exhibition rooms, showcases the allure of these ancient, exquisitely crafted bronze artifacts from various angles. This year, we feature ancient inscriptions cast into bronze, exploring the mysterious world of ancient Chinese writing. Gallery 01: A Collection of Masterpieces This exhibition room brings together a selection of the finest masterpieces from the Sumitomo Collection of Chinese bronze artifacts. Newly redesigned display cases allow us to fully appreciate the charm of these masterpieces. We also provide explanations on the fundamentals of Chinese bronze artifacts, offering an introduction to their world. Gallery 02: Types and Uses of Bronze Artifacts This exhibition room focuses on the various types of bronze artifacts and their uses. Focusing on the four designated uses of uniquely shaped Chinese bronze vessels—tableware, wine vessels, water vessels, and musical instruments—this exhibition utilizes digital content, including videos, to convey how they were used in the past. Gallery 03: Special Exhibition \"Bronze Inscriptions\" Some bronze vessels have ancient Chinese characters—bronze inscriptions—cast onto their surfaces. These bronze inscriptions, possessing both aesthetic beauty and serving as valuable historical materials that convey the thoughts and social structures of the people of that time, are introduced here along with masterpieces from the Sumitomo Collection. Gallery 04: Spread to East Asia The bronze culture that originated in China subsequently spread its influence throughout East Asia, leading to the creation of unique bronze vessels in various regions. Here, focusing on mirrors widely adopted in East Asia, this exhibition examines the development of bronze culture, also including bronze vessels from surrounding regions, including Japan."
