              - 'heading "Satoshi Someya Exhibition: trace tracing" [level=2]'
          - generic:
            - paragraph: Based in Kyoto, Satoshi Someya focuses on the diverse decorative properties of lacquer—its function as a paint, its unique cultural background, and the variety of textures represented by its luster and decorative techniques. He explores the nature of decoration by viewing lacquer not merely as a craft material, but as a "medium." This exhibition is based on Someya's perspective on lacquer and decoration, and consists of works based on research into Kagi-zen's confectionery, Tatsuo Kuroda's works, and historical artifacts. Furthermore, with the cooperation of poet Daishi Okano, one of the highlights of this exhibition is the display that allows viewers to imagine Kagi-zen's confectionery by interpreting Someya's works together with Okano's poems. Through the single material of lacquer, one perspective is followed by another. We hope you will enjoy the different ways in which each creator engages with the material and their expressions, which emerge in this process of learning from the past to create something new.
            - generic:
              - button:
