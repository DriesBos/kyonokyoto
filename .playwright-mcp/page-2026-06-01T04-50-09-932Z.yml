              - 'heading "Modern Urban Life and Takehisa Yumeji: Works from the Kawanishi Hide Collection" [level=2]'
          - generic:
            - paragraph: "The year 2024 marked the 140th anniversary of the artist Takehisa Yumeji’s birth and the 90th anniversary of his death. In light of Yumeji’s unwavering reputation as a master of modern Japanese art, retrospectives of the artist’s work are being held throughout Japan. However, Yumeji was better known as an illustrator and designer than a master artist to Taisho- and Showa-era children, art lovers, and young artists. This is evident from the multitude of diverse products, including picture postcards, envelopes, chiyogami (decorative paper), and furoshiki , that bore Yumeji’s works during his lifetime. The sosaku-hanga [original or self-produced prints] artist Kawanishi Hide was also captivated by Yumeji’s pictures and poems. Over one third of Kawanishi’s huge print collection is made up of Yumeji’s prints, books, and other items. Along with works by Yumeji, widely recognized as a star of modern popular culture in the Taisho era (1912–1926), this exhibition presents scenes of urban life, modern landscapes, avant-garde expressions, and playful worlds created by Showa-era (1926–1989) painters and print artists such as Kawanishi and Onchi Koshiro, both of whom admired Yumeji. *Main Image: KAWANISHI Hide, Circus (Feats of Horsemanship), 1928, The National Museum of Modern Art, Kyoto -->"
            - generic:
