      - button "Star event 2026.06.12 - 2026.08.19 ddd gallery GRAPHIC CUBE –THEATER POSTERS From the DNP Graphic Design Archives Collection This exhibition takes a multifaceted look at the relationship between graphic design and the performing arts. Through the lens of the DNP Graphic Design Archives' collection of theater posters, it introduces how graphic design can condense the one-off nature and simultaneously merging of forms found in temporal arts like theater and dance onto a two-dimensional surface. Take a fresh look at the power of posters, and their ability to not only spread awareness, but to create memories and lead viewers to their next experience. GRAPHIC CUBE –THEATER POSTERS From the DNP Graphic Design Archives Collection" [ref=e638]:
