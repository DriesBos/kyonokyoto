              - 'heading "Kurashiki Aya: A woman is born, and a woman dies, ——mother''s blood, wine, chocolate, alcohol, alcohol, alcohol" [level=2]'
          - generic:
            - paragraph: Kurashiki Aya explores the relationship between the self, others, and communities through her work. She creates collages by combining religious masterpieces with images found online and photographs she has taken herself. These are then transferred onto canvas, positioning the resulting works as acts of faith and care. In addition to her two-dimensional pieces, she also develops installations and ritualistic performances. For this exhibition, Kurashiki will create new works using pieces from the museum’s collection as motifs. By superimposing her own physical experiences and sensations onto works that have long been discussed within the broader narrative of Kyoto art, she will forge new relationships between personal memory and history. What is captured through her transfers is not merely imagery, but also the accumulation of time and the human gaze. This exhibition will offer a space to reflect on our relationship with others and history through such layers. The Triangle The Triangle (basement level of the Northwest Entrance, free admission) is a space newly created to mark the renewal opening of the Kyoto City KYOCERA Museum of Art. It aims to nurture and support emerging artists, while also providing a space where visitors, including citizens and tourists, can freely engage with contemporary art. As of February 2026, the space has introduced a total of 21 emerging artists associated with Kyoto. In 2026, the following three artists will be introduced. This initiative is supported through the “Charity Auction & Gala Dinner for Kyoto City KYOCERA Museum of Art.”
