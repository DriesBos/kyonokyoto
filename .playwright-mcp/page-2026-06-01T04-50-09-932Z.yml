            - paragraph: 京都市北区にあるKURA MONZEN Galleryは、2025年最後の展覧会 「古道人 」を開催いたします。 この展覧会は、絵画、詩歌、書をひとつの瞑想的な芸術形式に融合させ、日本の文人芸術の伝統を体現した最後の巨匠とよく言われる福田古道人（1865～1944年）に焦点を当てています。 古道仁の風景画は、一目でそれと分かる。山々は花のように曲がり、咲き誇り、雲は筆致のリズミカルな流れとともに流れ、広大な自然の中に、孤独な聖者や隠者の小屋が静かに瞑想している。彼の絵画に刻まれた詩は、詩とイメージが絡み合い、互いに光を当て合っている。 江戸時代後期に生まれた古道人は、日本が鎖国的な封建社会から近代的な工業国家へと変貌を遂げる時代を生き抜いた。同時代の多くの芸術家が西洋の芸術的影響を受けていた中、古道人は洗練された学者詩人の理想を貫き、内省と伝統に根ざした美学を追求した。 死後、戦後の社会情勢の変化、学問的関心の変遷、そして作品の個人コレクションへの散逸により、彼の評価は徐々に薄れていった。しかしながら、今日、新たな研究によって彼の作品は再び注目を集め、古道仁は過去の遺物ではなく、深く個人的な視点を通して近代性に対する新たなビジョンを表現した、他に類を見ない現代的な声として認識されている。 本展では、KURA MONZEN Galleryが長年にわたり所蔵する古道人コレクションより、約40点の作品を展示いたします。古道人作品の静かな深淵を体感し、時代を超えた美を再発見してください。 皆様のご来場を心よりお待ちしております。 展覧会は 11月8日 から 12月8日 まで開催されます。ぜひギャラリーにお立ち寄りいただくか、オンラインでコレクションとカタログをご覧ください。
