              - heading "Ukiyo-e Super Creator Utagawa Kuniyoshi Exhibition" [level=2]
          - generic:
            - paragraph: The pinnacle of Edo entertainment! Utagawa Kuniyoshi (1797-1861) was a ukiyo-e artist who flourished in the late Edo period. Known as a "master of eccentricity," known for his warrior prints, his love of cats, and his satirical and humorous style, he displayed multifaceted talent. He depicted stylish and vibrant women in portraits of beautiful women, captured the essence of popular actors in actor portraits, and incorporated Western painting techniques into his landscapes, showcasing a fresh and innovative style. Dedicated to entertaining his fellow Edoites, he consistently produced top-notch works in every genre, truly a super-creator of the ukiyo-e world! This exhibition showcases approximately 200 works by Kuniyoshi, including his most famous pieces such as "The Old Imperial Palace of Soma," "He Looks Scary, But He's a Really Nice Person," and "Fifty-Three Cats Who Keep Pranks," as well as other works that fully demonstrate his unparalleled talent. These works are divided into six genres, making it easy to understand Kuniyoshi's diverse activities. We will introduce the highlights of the exhibition with explanations that allow you to feel the personality of the artist while experiencing the various worlds of Kuniyoshi and the lives of the people of that time. Kuniyoshi's top-notch entertainment is guaranteed to thrill and delight our hearts, just as it did the people of Edo at the time!
