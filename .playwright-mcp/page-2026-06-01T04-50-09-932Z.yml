              - heading "Paths | MtK Contemporary Art" [level=2]
          - generic:
            - paragraph: "1. ©Penny Davenport、 Follow 、2026、oil on linen, framed、H43 × W33 × D4 cm 2. ©Jason Thompson、 Unfinished Path 、2026、acrylic paint and pencil on wood、H19 × W14 cm 3・4. ©Elena Tutatchikova、2026、glazed ceramic, porcelain, terra sigillata、H21.5 × W24.5 × D2.5 cm To coincide with the publication of Paths , MtK Contemporary Art will present the exhibition of the same title, featuring works by Penny Davenport, Jason Thompson and Elena Tutatchikova. Alongside paintings and ceramic works by the three artists, the exhibition will also feature drawings included in the book, exchanged between Liverpool and Kyoto, some of which were completed collaboratively by all three artists. Connecting the works is the idea of the ‘path’ as something constantly being re-created (Elena Tutatchikova, p.41). Paths emerge throughout the works in many forms: the paths of landscapes shaped by the body, the paths generated through thought, and the paths of words layered through conversation. Appearing and disappearing within the works, at times fading from view altogether, they nevertheless persist as a sense of moving towards something, of trying to arrive somewhere. Thinking, conversing and making – all become part of a continuous and interconnected cycle, perhaps even a process through which living beings grow, and life itself unfolds. ‘A path is just a way of describing what growth is, what creation is. And we are making things. That’s what’s going on.’ — Jason Thompson, p.43 While remaining in dialogue and exchanging works with one another, the three artists have continued to develop independent approaches to making. Within the exhibition, their works finally converge."
