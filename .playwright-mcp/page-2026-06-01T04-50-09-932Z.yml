      - button "Star event 2026.04.17 - 2026.06.01 Kuramonzen グループ展 \"BLACK & WHITE\" 芸術は、国境を越え、文化の隔たりを埋め、共通の表現を通して人類を結びつける 類まれな力を持っています。時代と地理を超えて、芸術は普遍言語としての役割を果たしてきました。古代の洞窟壁画から現代の街頭壁画まで、芸術は言語、宗教、政治の違いを超えて、文化を深く人間的なレベルで結びつけます。グローバル化した現代社会において、こうした創造的な対話は単に人々を豊かにするだけでなく、不可欠なものなのです。 本展では、豊かで絡み合った歴史を持つ日本と韓国から、白と黒という二つの要素に焦点を絞った6名のアーティストが集結します。アーティストたちは、この相反する二つの要素を通して、ニュアンス、コントラスト、そして根底にある統一性を探求します。 本展は 、2025年6月7日（土）から7月21日（月・祝）まで KURA MONZEN Gallery にて開催されます。皆様のご来場をお待ちしております。 グループ展 \"BLACK & WHITE\"" [ref=e191]:
