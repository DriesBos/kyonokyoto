lineages%3A%20the%20traditional%20African%20attire%20dashiki%20and%20the%20Japanese%20kimono.%20The%20dashiki%20has%20its%20origins%20in%20West%20Africa%2C%20where%20it%20was%20historically%20worn%20as%20a%20symbol%20of%20ethnic%20and%20community%20identity.%20During%20the%201960s%2C%20it%20became%20a%20widely%20adopted%20symbol%20of%20the%20Black%20Power%20movement%20in%20the%20United%20States.%20The%20kimono%2C%20for%20its%20part%2C%20is%20a%20manifestation%20of%20Japanese%20folklore%2C%20having%20been%20crafted%20by%20people%20ever%20since%20the%20beginning%20of%20history%2C%20as%20well%20as%20a%20symbol%20of%20the%20craft%20culture%20associated%20with%20dyeing%20and%20weaving.&location=2F%20HOSOO%20FLAGSHIP%20STORE%2C%20412%20Kakimoto-cho%2C%20Nakagyo-ku%2C%20Kyoto%20604-8173%20Japan
