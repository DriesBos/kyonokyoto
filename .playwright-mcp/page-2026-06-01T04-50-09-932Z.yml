          - generic:
            - paragraph: 『怪談』は日本の昔話を集めた書物として日本人の間でよく知られていますが、原作者がギリシャのレフカダ島に生まれ幼少期をアイルランドで過ごしたラフカディオ・ハーンであること、そして日本に帰化して小泉八雲と名乗ったハーンによる原作が英語であったことは、あまり知られているとは言えません。 2023 年春、ダブリンから、この『怪談』にちなんだ美術展をサポートして欲しいとの依頼が届いたとき、名古屋地域で開催するとしたら、どんな人々が興味を持ってくれるだろうかと考えました。アイルランド人という文化的ルーツを持ちながら、放浪の旅ののち、人生最後の 14 年を過ごした日本を愛し世界に発信したハーン／八雲とその作品を称揚する美術展を、どうしたら当地の人々に理解し楽しんでもらえるのか？ それなら、「怪談 ラフカディオ・ハーンとの邂逅」を「アイルランド文化」の中に位置付けてみたらどうだろう。そうすれば、これらの作品の理解も進み、アイルランドと日本の美術交流の意義もより良く伝えられるのではないか？こうした発想から、アイリッシュデイズ実行委員会が結成されました。
