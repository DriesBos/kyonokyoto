              - 'heading "Theaster Gates: Glorious Robe" [level=2]'
          - generic:
            - paragraph: "Hosoo is pleased to announce the exhibition Theaster Gates: Glorious Robe , a joint project with the artist. Theaster Gates has engaged in an expansive artistic practice that encompasses ceramics, sculpture, music, performance, architectural interventions, and urban development. Through these diverse media, Gates seeks to reimagine and propose new futures for seemingly fallow and endangered spaces, archives, collections, histories and rituals. Since its establishment in the Nishijin district of Kyoto in 1688, Hosoo has been dedicated to pioneering advancements in textile production, while firmly anchored in the time-honored practices of traditional dyeing and weaving. Gates and Hosoo have collaborated extensively on a number of creative projects that privilege textiles and garments as artistic practice, beginning with Gates’s 2024 solo exhibition Afro Mingei at the Mori Art Museum. The present exhibition, entitled Glorious Robe , showcases the latest body of work that emerged from these dialogues. The novel forms of clothes in this exhibition, born from the distinct lineages of African and Japanese sartorial cultures, express the “power to move society” that grounds Gates’ practice—from honoring craft cultures to exalting culturally significant archives. At the core of this project lies Dashikimono , a garment derived from two distinct cultural lineages: the traditional African attire dashiki and the Japanese kimono. The dashiki has its origins in West Africa, where it was historically worn as a symbol of ethnic and community identity. During the 1960s, it became a widely adopted symbol of the Black Power movement in the United States. The kimono, for its part, is a manifestation of Japanese folklore, having been crafted by people ever since the beginning of history, as well as a symbol of the craft culture associated with dyeing and weaving."
            - generic:
              - button:
