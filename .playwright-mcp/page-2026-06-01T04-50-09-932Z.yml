            - generic:
              - 'heading "YBA & BEYOND: British Art in the 90s from the Tate Collection" [level=2]'
          - generic:
            - paragraph: "Breaking the Norms: 1990s British Art Is Here This exhibition explores the dynamic evolution of British art from the late 1980s to the early 2000s. After going through the Thatcher era (1979–1990), a charged and uncertain social climate gave rise to a new generation of artists who challenged traditional norms and embraced bold, experimental practices. Many of the newer generation of artists who came to prominence in the 1990s were referred to in the art and popular media under the title Young British Artists (YBAs). Alongside other artists active at the time, these artists explored themes such as popular culture, personal identity, and shifting social structures. They worked across a diverse range of media, including painting, sculpture, photography, video, and installation. Featuring around 90 works by approximately 50 artists, the exhibition traces the radical creativity and groundbreaking approaches that redefined British art in the 1990s."
