              - heading "The House of the Master Thief" [level=2]
          - generic:
            - paragraph: Thieves may be condemned as wrongdoers, yet they’ve appeared in stories across times and cultures. Sometimes they’re superhuman talents, mysterious heroes, or even lovable bunglers. Why do we find ourselves drawn to them—sometimes even cheering them on? This exhibition invites you to sneak into the home of a legendary “master thief” who’s gone out for one last heist. The gallery unfolds across eight rooms—corridors, a parlor, a secret chamber, and more—filled with portraits of famous thieves, disguises, books, and artworks, each adding to the intrigue. Who really lives here? And can you make it out of the master thief’s house in one piece? As you explore, use the clues in each room to imagine who this elusive figure might be. We’d love to welcome you to this immersive experience—come enjoy the charm and mystery of thieves, and the quirks of human nature, in a fresh new way.
