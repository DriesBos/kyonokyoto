              - 'heading "No.240 Yuriko Morioka : Pottery" [level=2]'
          - generic:
            - paragraph: We are pleased to present an exhibition of works by Yuriko Morioka, a ceramic artist based in Amano, Wakayama Prefecture. Having worked through phases of creating unglazed, high-fired ceramics and earthenware, Morioka now focuses primarily on white porcelain fired in a wood kiln. Since 1982, she has been producing white porcelain in Amano, at the foot of Mount Koya. Drawing on her experiences studying ceramics at kiln sites in Korea, she has deepened her practice while reflecting on the aesthetics of Joseon Dynasty white porcelain. Her white porcelain is fired using a technique known as namagake, in which glaze is applied directly onto the unfired clay without a preliminary bisque firing. This process allows the natural variations of the kiln—such as fluctuations in firing and the subtle crawling of the glaze—to become integral to the surface of each piece. With use, the vessels gradually develop richer expressions. Unlike the pure, uniform white often associated with porcelain, Morioka’s works retain a quiet trace of the clay itself. They are vessels that continue to mature and evolve over time through use. Created amid the abundant yet often harsh natural environment at the foot of Mount Koya, her works embody a gentle generosity and a profound sense of depth that seems to envelop the viewer. This exhibition will feature a range of everyday tableware, including plates and bowls, as well as flower vessels with relief carving and faceted surfaces, along with various pieces decorated in underglaze blue. We warmly invite you to view the exhibition.
