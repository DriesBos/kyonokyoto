              - heading "I want to be happy! - A painting of prayer -" [level=2]
          - generic:
            - paragraph: The Fukuda Museum of Art in Arashiyama, Kyoto, will be holding a special exhibition themed on prayer from July 18th to September 6th, 2026. Since ancient times, before the advent of writing, people have imbued paintings with heartfelt prayers. Through painting and viewing art, they have prayed for their own happiness, the happiness of those close to them, and the peace and security of their nation. This exhibition sheds light on the diverse forms of prayer embodied in these works. First, we will introduce the world of "Buddhist paintings," depicting the figures and stories of Buddha. Introduced during the Asuka period, Buddhist paintings, like Buddhist statues, were objects of prayer in temples and places of worship. In modern times, after a major crisis caused by the anti-Buddhist movement in the early Meiji era, the re-evaluation of traditional art by figures like Okakura Tenshin and the progress of research into Buddhist sites in India led to a resurgence in the production of Buddhist paintings. Painters incorporated the shading and light techniques of Western painting, pursuing new possibilities for religious art. This chapter introduces a variety of modern works depicting the life of Buddha and celestial maidens, beginning with Buddhist narrative paintings by Yokoyama Taikan and Hishida Shunso, and continuing with works by Irie Namiko and Murakami Kagaku, who entrusted their spirituality to Buddhist paintings.
