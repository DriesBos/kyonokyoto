            - generic:
              - 'heading "Commemorating the 400th Anniversary of the Kan''ei Imperial Visit Special Exhibition: The Kan''ei Imperial Visit and the Cultural Figures of the Flower Capital" [level=2]'
          - generic:
            - paragraph: In September of the third year of the Kan'ei era (1626), at the beginning of the Edo period, Emperor Go-Mizunoo visited Nijo Castle in Kyoto at the invitation of Tokugawa Hidetada and Iemitsu. On the first day, an unprecedentedly grand procession unfolded through the streets of Kyoto, consisting of the Emperor, court nobles, and daimyo from all over the country led by the Shogun to welcome them. The "Imperial Procession to Nijo Castle" folding screen (Izumiya Hakukokan Museum), which depicts this scene, vividly portrays not only the resplendent nobles but also the spectators who gathered from all over the country, dressed in their finest attire and reveling in the festivities. This exhibition looks back on the Kan'ei Imperial Procession, which heralded an era of peace and led to the stirrings of a new culture, and focuses on the elegant Kan'ei culture that developed in the latter half of the 17th century. It introduces the aesthetic sensibilities and interactions of cultural figures who emerged like a constellation of stars, transcending social status, including Emperor Go-Mizunoo, Tofukumonin, Kobori Enshu, Sen Sōtan, Tawaraya Sōtatsu, and Nonomura Ninsei.
