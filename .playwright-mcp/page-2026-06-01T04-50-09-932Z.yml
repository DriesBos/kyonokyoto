            - paragraph: "ARTRO is pleased to present Ai Makita's solo exhibition \"First Shadows, Then Reflections, Then the Things Themselves\" from June 6 to July 5, 2026. Opening Reception: Saturday, June 6, 2025, 5:00 PM – 7:00 PM The artist will be in attendance. --- My work is a process of exploring the boundaries between machine and body, digital and analog, and illusion and reality. This exploration, which once began with awe of technology, has recently expanded further through dialogue with AI and mixing with diverse materials. The title of this exhibition, \"First Shadows, Then Reflections, Then the Things Themselves,\" draws inspiration from Plateau's \"Allegory of the Cave,\" while simultaneously juxtaposing the physical phenomena in my own creative process with my perception of the world. The \"shadows\" cast by three-dimensional works, the \"reflections\" of light emitted by mirror-like layers of painting, and the \"things themselves\" that emerge as a single entity. I have woven together a collection of works that move between two and three dimensions, organic and inorganic, into a single phenomenon within the historic space of a Meiji-era storehouse in Kyoto. The process by which images drawn from the immaterial intelligence of AI are transformed with the physicality and three-dimensional mass of oil painting. In this place where fragments of these transformations intersect, inorganic artificial objects begin their own unique metabolism, and a new soul is instilled within them. Ai Makita My practice is a process of exploring the boundaries between machine and body, digital and analog, and the virtual and the real. This inquiry, which began with a sense of awe toward technology, has expanded in recent years through a dialogue with AI and the mixing of diverse materials. The title of this exhibition, First Shadows, Then Reflections, Then the Things Themselves, takes Plato's Allegory of the Cave as a starting point, layering it with the physical phenomena of my own production and the way we perceive the world. The shadows cast by three-dimensional works, the reflections of light emitted from mirror-like layers of paint, and the things themselves that emerge as singular entities—these works, moving between two and three dimensions, the organic and the inorganic, are woven together as a single event within the historical space of a traditional Kyoto warehouse. It is a process in which images drawn from a non-material intelligence like AI undergo a metamorphosis through the physicality of oil paint and three-dimensional mass. In the intersection of these fragments, inorganic artifacts begin their own metabolism, and a new soul takes root. Ai Makita Biography 1985 Born in Chiba, Japan 2008 Tsukuba University, B.F.A. in Art and Design 2010 Tokyo Gakugei University, M.F.A. in Oil painting 2013 Tokyo University of Arts, M.F.A. in Art and Education 2014-2018 Professor of production of children’s literature in the Department of Early Childhood Education at Tokyo Seitoku College 2016- Artistic supporter in a project of Agency for Cultural Affairs which aim to support the artistic work for disability people Solo Exhibition 2025 Metabolizing Machine, Baert Gallery, Los Angeles 2025 Form and Matter, Tokyo 8min, Tokyo 2024 Man has, as it were, become a kind of prosthetic God-, PARCEL, Tokyo 2024 Prosthetic Gods, The Something Machine, New York 2022 Interspecies, Mitsukoshi Contemporary, Tokyo 2022 Tectonic Shifts, The Something Machine, New York 2022 Species, Tsutaya Book Gallery Roppongi, Tokyo 2021 Luminous Beings, haku Kyoto, Kyoto 2021 Hyperdimension, mhPROJECTnyc, New York 2020 Artifact, Mitsukoshi Nihombashi, Tokyo 2019 Ai Makita exhibition”Forms” Chiba bank gallery, Tokyo 2018 Reflect on 10 years, Karuizawa New Art Museum, Nagano 2017 Works in New York, Spiral, Tokyo Gradation, Gallery Vask, Manila Moving, Gallery Inage, Chiba 2015 Behave As a Named Existence, Roentgenwerke AG, Tokyo 2013 13・17, Ai Kowada Gallery, Tokyo