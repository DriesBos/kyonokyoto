            - paragraph: 2025年最初の企画展として、新たな表現の波を体感できる「いぶき / IBUKI」を開催します。陶芸家11名、ガラス作家1名、写真家1名の計13名の作家が、それぞれの作品に新たな息吹と生命力を吹き込みます。 「 息吹 」とは、春の訪れのように再生、再生、新たな生命の誕生を意味します。それは、言うまでもなく芸術活動に不可欠な創造と成長の原動力を象徴しています。 参加アーティスト 13 名にとって、「意吹」は単なるエネルギーやインスピレーション以上のものです。 彼らの作品には、長年の献身的な職人技、深い探求によって形作られた洗練された美学、そして芸術の限界を押し広げようとする揺るぎない決意が体現されています。この本質を強調するために、私たちは「意思」と「呼吸」を組み合わせた「 意吹 」という用語を採用しています。彼らの作品を通して、私たちは情熱と粘り強さの収束を目撃し、無限の新しい芸術の可能性を導きます。 本展では、陶芸、ガラス、写真など、さまざまな分野の作家が一堂に会し、個性豊かな表現が交錯し刺激しあうダイナミックな空間を創り上げます。アートの未来を切り拓く決意の息吹が息づく「いぶき」を、ぜひご体感ください。
