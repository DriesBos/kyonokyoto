              - heading "共鳴 -Kyomei || Modern Masters" [level=2]
          - generic:
            - paragraph: この秋、毎年恒例の "Modern Masters" 展として「 共鳴 」を開催いたします。本展に出展する 10名の作家は、 いずれも日本の陶芸界を牽引する存在であり、その作品を皆様にご紹介できることを大変嬉しく思っております。展示作品は、それぞれの作家の生涯を網羅し、まさに現代陶芸の最高峰と言える作品の数々です。 この展覧会を楽しんでいただき、陶芸という古代の対話があなたの心に響き、感動を与えてくれることを心から願っております。 本展は 、2025年9月27日（土）から11月3日（金）まで、 KURA MONZEN Gallery にて開催されます。皆様のご来場をお待ちしております。 ____________________________________________________________ この秋、KURA MONZEN Galleryでは毎年恒例の「Modern Masters」シリーズの最新企画展として、「 共鳴 -Kyomei ||」モダンマスターズ 』を開催いたします。 本展では、日本の陶芸界において確固たる評価を経て 10名の陶芸家の 作品をご紹介させていただきました。それぞれのキャリアをかけて制作された代表的な作品の数々が一堂に会し、現代陶芸の奥深い多様性を感じられる内容となっております。 本展をご覧いただき、作品に込められた魅力を感じながら、なぜ自分がこの作家たちに惹かれるのかを思いつき、芸術がなんとなく響き合い、つながりがあるのかを感じていただければ幸いです。 会期は、 2025年9月27日(土)から11月3日(月・祝)まで 。 ぜひお越しを心よりお待ちしております。 ___________________________________________________________________ ___________________________________________________________________ アーティスト（名前をクリックするとプロフィールが表示されます） 新 学 (1973 伊賀生まれ) 鯉家 良二 (1938-2020 常滑市生まれ) 宮下 善治 (1939-2012 京都生まれ) 三輪 栄造 (1946-1999 萩生まれ)
