              - 'heading "30th Anniversary of the Museum''s Opening, 60th Anniversary of the Deaths of Tamesaburo Yamamoto and Kanjiro Kawai: Resonance - Kanjiro Kawai x Shoji Hamada - From the Tamesaburo Yamamoto Collection" [level=2]'
          - generic:
            - paragraph: Tamesaburo Yamamoto (1893-1966), the first president of Asahi Breweries Ltd. (now Asahi Group Holdings, Ltd.), was a strong supporter of the Mingei movement from its early stages. The Tamesaburo Yamamoto Collection held by our museum mainly consists of works by Kanjiro Kawai (1890-1966) and Shoji Hamada (1894-1978), who were central figures in the Mingei movement. Kawai and Hamada met at Tokyo Higher Technical School (now Tokyo University of Science) and honed their skills together at the Kyoto Municipal Ceramic Research Institute. In 1926, they co-founded the Mingei movement with thinkers such as Soetsu Yanagi, and maintained a deep friendship throughout their lives. While tracing the lives of these two men whose young souls resonated with each other, we will introduce the charm of the works of both men who continued to pursue their respective paths. [Kawai Kanjiro (1890-1966)] Born in what is now Yasugi City, Shimane Prefecture. He met Hamada Shoji at the Ceramics Department of Tokyo Higher Technical School (now Tokyo University of Science), and together they founded the Mingei (folk craft) movement through their interactions with Yanagi Soetsu and others. He created pottery based in Gojozaka, Kyoto, and produced a diverse range of works throughout his life. [Hamada Shoji (1894-1978)] Born in what is now Kawasaki City, Kanagawa Prefecture. He met Kawai Kanjiro at the Ceramics Department of Tokyo Higher Technical School (now Tokyo University of Science). In 1920, he traveled to England with Bernard Leach, where he created pottery, and after returning to Japan, he promoted the Mingei movement based in Mashiko, Tochigi Prefecture. List of Works
