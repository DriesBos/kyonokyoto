              - 'heading "Special Exhibition: Cultural Heritage, Forever 2026 – Techniques and People to Pass on to the Next Generation" [level=2]'
          - generic:
            - paragraph: The archaeological artifacts, historical documents, and works of art and crafts that convey the culture and thoughts of our ancestors are something we can witness today only because they have been protected and passed down by many people over the years. This means that whether these cultural properties can survive for the next century depends on us today. Since its founding in 1991, the Sumitomo Foundation has considered it the responsibility of modern people to pass on cultural properties, which are treasures common to all humanity, to future generations, and has strived to provide grants for cultural property maintenance and restoration projects. From its position as a private organization, it has expanded its grant scope to include cultural properties not only in Japan but also overseas, and has continued its activities for 35 years. This exhibition aims to shed light on the environment, technology, and people surrounding the preservation and restoration of cultural properties by displaying cultural properties that have been restored and revived through the Sumitomo Foundation's grant programs. Cultural properties are facing increasingly difficult circumstances due to the aging of society, depopulation of rural areas, the resulting shortage of people involved in cultural property care, strained finances, and the increasing severity of natural disasters. How can cultural property restoration, a process in which many people collaborate on a single work, generously using carefully selected materials and continuously striving for the best results with techniques that combine tradition and the latest advancements, survive in today's society that prioritizes cost-effectiveness and is based on the premise of mass consumption? To prevent confusion and stagnation in the face of numerous challenges, we hope to reiterate the significance and techniques of cultural property restoration, as well as the efforts of the people involved. *This exhibition will not be touring to the Sen-oku Hakukokan Tokyo.
