              - 'heading "Special Exhibition: Commemorating the 100th Anniversary of the Death of Sumitomo Shunsui - The Sumitomo Collection of Modern Art - A Blessing" [level=2]'
          - generic:
            - paragraph: "To commemorate the 100th anniversary of the death of Sumitomo Kichizaemon Tomozumi (pen name: Shunsui, 1864–1926), the 15th head of the Sumitomo family who laid the foundation for the Sen-oku Hakukokan Museum's collection, we will introduce works associated with him. We will trace his interactions with artists who lived during the same era through the Japanese paintings, Western paintings, and crafts in our collection. Furthermore, we will re-examine his aesthetic sense through the works that interested him, and take this opportunity to reconsider the history of the collection's formation, including the background of its collection and the historical context of its time."
