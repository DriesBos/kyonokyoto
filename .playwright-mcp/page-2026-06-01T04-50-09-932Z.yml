              - 'heading "Antonio Fontanesi: Transcending Landscape ―A European Artist at the Opening of Japan" [level=2]'
          - generic:
            - paragraph: "In the late 19th century, the Italian painter Antonio Fontanesi (1818–1912) educated burgeoning artists such as Asai Chu, Koyama Shotaro, and Matsuoka Hisashi as a teacher at the Kobu Bijutsu Gakko (Technical Art School). In terms of European art history, Fontanesi was influenced by the Barbizon artists and J.M.W. Turner before emerging as a painter of unique poetic landscapes. This exhibition, organized in cooperation with the Turin Civic Gallery of Modern and Contemporary Art (GAM) and the Turin Museums Foundation, provides a comprehensive overview of Fontanesi’s entire career while highlighting his originality. In addition, works by Japanese students and later generations of Italian artists shed light on the artist’s influence and legacy. By painting a complete picture of Antonio Fontanesi, the exhibition shows that he was much more than a “foreign expert” employed by the Japanese government. * Main Image: Antonio FONTANESI, April , 1873, Turin Civic Gallery of Modern and Contemporary Art (GAM), Courtesy of Turin Museums Foundation -->"
