              - 'heading "[Spring] Bronze Gallery: The Age of Chinese Bronze" [level=2]'
          - generic:
            - paragraph: What did the ancient Chinese find at the end of the endlessly repeating spiral? The bronze artifacts of the Yin and Zhou dynasties, created with advanced casting techniques, are characterized by their fantastical forms and intricate, bizarre patterns. A variety of motifs appear, from real animals such as tigers and owls to mythical beasts such as dragons, phoenixes, and taotie, and the spiral patterns that fill both the inside and outside of these patterns and motifs further enhance the mystical impression. Throughout history and across cultures, the spiral has been represented with strong magical connotations. From its repeating rhythm, ever-changing patterns and designs are born, and the visual effect that seems to radiate overflowing energy is unlike anything else. At the Sen-oku Hakukokan Bronze Gallery, we will bring together masterpieces from the Sumitomo Collection, considered among the world's finest, and introduce the captivating design sensibilities of ancient China in their entirety. Enjoy the treasures of ancient China, which could be called the last unexplored frontier of Oriental art, in a special space designed exclusively to display bronze artifacts.
