              - 'heading "Contemporary Dyeing Expressions 1991-2025: A Chronicle of 25 Dyeing and Clear Stream Exhibitions" [level=2]'
          - generic:
            - paragraph: The Some-Seiryu Exhibition, which began in 1991 at the Kyoto City Museum of Art, opened as a groundbreaking exhibition unprecedented in that it brought together the works of contemporary dyeing artists from various schools and schools. Since then, this exhibition, which features new works by leading artists in the world of dyeing, from established figures to rising stars, has continued as a biennial exhibition, moving venues since the opening of the Some-Seiryu Museum, a museum dedicated to contemporary dyeing, in 2006, and will celebrate its 25th edition in 2025. This activity has showcased the diversity and innovation of contemporary dyeing expression through various forms of works, including panels, folding screens, framed works, hanging cloths, and three-dimensional works, opening up new horizons. This exhibition looks back on the trajectory built over 35 years under the philosophy of the Some-Seiryu Exhibition—the further development of dyeing and weaving culture and the creation of a space for artists to freely express themselves—through approximately 90 major works exhibited to date. Looking at the exhibition as a whole, we can trace how dyeing—as a material, technique, and expression—has resonated with and expanded through the changing times. The history of this exhibition, which has continued through generational changes, carries weight, and tracing its progress itself has a great narrative quality. It can be said that this is a valuable opportunity to feel the potential of dyeing, a uniquely Japanese cultural form, to develop on an international level.
