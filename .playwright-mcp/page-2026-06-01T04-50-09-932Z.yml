              - 'heading "Special Exhibition: Raku Successive Generations — Raku Tea Bowls Crossing Time" [level=2]'
          - generic:
            - paragraph: The tradition of Raku tea bowls has been transmitted within the Raku family for over 450 years through the principle of isshi sōden , whereby artistic secrets and technical knowledge are inherited by a single successor. The origins of the Raku lineage date to the Azuchi–Momoyama period (late sixteenth century), a formative era marked by significant political and social transformation under figures such as Oda Nobunaga and Toyotomi Hideyoshi. In this age of military conflict and cultural realignment, the tea master Sen Rikyū exerted profound influence on the ruling elite through the practice of tea. The origins of Raku ware are closely associated with his collaboration with the Raku family. At Rikyū's request, the first-generation Raku Chōjirō was commissioned to produce a new type of tea bowl that would embody the ideals of Rikyū's wabi-cha , characterised by simplicity, austerity and spiritual depth. This encounter marks the beginning of the Raku tradition.
