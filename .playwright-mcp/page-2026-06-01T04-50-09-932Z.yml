              - heading "野村 耕 -Nomura Ko || SCREAMING LOTS OF DIFFERENT SONGS" [level=2]
          - generic:
            - paragraph: 本展は、戦後日本美術において 継承と新生を行き来しながら独自の表現を築いた作家、野村 耕 (1927-1991)の創作の軌跡を辿ります。 日本画の伝統が深く根付く京都で生まれ育った野村は、幼少より画家としてのキャリアをスタートさせました。戦後間もない1950年、同世代のアーティストたちが設立した前衛芸術集団「パンレアル美術協会」に入団し、日本画の既成概念にとらわれない表現を模索し始めました。初期の作品は幻想的な具象表現を特徴としていましたが、次第に「描くとはどういうことか？」「素材そのものが表現手段となり得るのか？」といった、より根源的な問いへと向かっていきました。 1950年代後半から60年代にかけて、野村は、セメント、粘板岩、産業廃棄物、新聞の版、染色用の型紙など、当時の日本画ではあまり見られない様々な素材を作品に取り入れました。日本画という文脈において、非常に先鋭的なこれらの実験は、絵画の限界に挑戦するものでした。70年代以降、野村の制作は平面の絵画表現にとどまらず、立体作品や空間構成へと展開していきます。伝統を基盤としつつも、その限界に内なる挑戦を続ける野村の作品には、静かで粘り強い実験精神が息づいています。 教育者としての活動と並行して、野村は毎年新作を制作・発表し続けました。同じことを繰り返すことを拒み、常に新しい素材や技法を探求し続ける姿勢が、彼の芸術活動の原動力となりました。この揺るぎない姿勢は、1989年に京都市美術館（現 京都市京セラ美術館）で開催された大回顧展で改めて強調され、野村の業績は再び注目を集めました。 本展では、野村耕を中心に、パンレアル美術協会会員の作品、そしてコレクターや作家の遺族から寄贈された貴重な作品を含む約60点を展示します。1950年代から1980年代にかけて制作されたコラージュ、フロッタージュ、水彩画、ミクストメディア作品など、20世紀日本美術の変遷を体感し、その揺るぎない豊かさと魅力を発見していただけます。
