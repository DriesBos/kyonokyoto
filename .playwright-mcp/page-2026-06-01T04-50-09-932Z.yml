              - heading "Matsunobe Soshi" [level=2]
          - generic:
            - paragraph: Matsunobe Soshi is an artist who engages with intangible phenomena such as lines, shadows, the unconscious, and the ground (background) through installations, sculptures, drawings and various other media. Using everyday motifs such as wallpaper, rubber bands, and graffiti as materials, he has presented works that focus on the processes by which these materials are made, as well as their functions and relationships. His practice calls into question the act of creation itself, prompting us to reconsider the premises of making, seeing, and being. Alongside introducing Matsunobe’s consistent approach, this exhibition offers viewers an opportunity to newly reflect on their own ways of perceiving and interpreting the world. The Triangle The Triangle (basement level of the Northwest Entrance, free admission) is a space newly created to mark the renewal opening of the Kyoto City KYOCERA Museum of Art. It aims to nurture and support emerging artists, while also providing a space where visitors, including citizens and tourists, can freely engage with contemporary art. As of February 2026, the space has introduced a total of 21 emerging artists associated with Kyoto. In 2026, the following three artists will be introduced. This initiative is supported through the “Charity Auction & Gala Dinner for Kyoto City KYOCERA Museum of Art.”
