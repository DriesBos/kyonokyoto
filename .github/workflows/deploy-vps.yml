name: Verify and deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-crawler-vps
  cancel-in-progress: false

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SHARP_IGNORE_GLOBAL_LIBVIPS: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/crawler/package-lock.json
            apps/web/package-lock.json
      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix apps/crawler
          npm ci --prefix apps/web
      - name: Check formatting
        run: npm run format:check
      - name: Test crawler
        run: npm --prefix apps/crawler test
      - name: Test web and source configuration
        run: npm --prefix apps/web test
      - name: Validate source configuration
        run: |
          node --input-type=module - <<'NODE'
          import { loadAllSourcesConfig, validateSourceConfig } from './data/sources/source-config.mjs';
          const warnings = (await loadAllSourcesConfig()).flatMap(validateSourceConfig);
          if (warnings.length) {
            console.error(warnings.join('\n'));
            process.exit(1);
          }
          NODE
      - name: Test source sync safety
        run: node scripts/source-sync-safety.mjs
      - name: Build web
        env:
          PUBLIC_SUPABASE_URL: https://example.supabase.co
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
        run: npm --prefix apps/web run build

  deploy:
    name: Fast-forward VPS
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Configure restricted SSH key
        env:
          VPS_DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 0700 -d ~/.ssh
          printf '%s\n' "$VPS_DEPLOY_KEY" > ~/.ssh/vps_deploy
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/vps_deploy ~/.ssh/known_hosts

      - name: Deploy current main
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          ssh \
            -T \
            -i ~/.ssh/vps_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST"
